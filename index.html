<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste HTML</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      color: #111827;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      width: 90%;
      max-width: 450px;
      text-align: center;
    }

    h1 {
      color: #f97316;
      margin-bottom: 10px;
    }

    p {
      font-size: 17px;
      color: #374151;
    }

    button {
      background: #f97316;
      color: white;
      border: none;
      padding: 12px 22px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #ea580c;
    }

    #mensagem {
      margin-top: 20px;
      font-weight: bold;
      color: #16a34a;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>HTML de Teste</h1>
    <p>Se esta página abriu corretamente, seu HTML está funcionando.</p>

    <button onclick="mostrarMensagem()">Clique aqui</button>

    <div id="mensagem"></div>
  </div>

  <script>
    function mostrarMensagem() {
      document.getElementById("mensagem").innerText =
        "Botão FUMEGANDO com JavaScript!";
    }
  </script>

</body>
</html>
